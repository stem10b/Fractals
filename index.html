<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mandelbrot Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui">
        <div id="status">RENDERING...</div>
        <div class="title">Fractal Engine</div>
        <div id="stats" class="stat-line">Iter: 200</div>
        <div id="zoom" class="stat-line">Zoom: 1.0x</div>
        
        <div class="button-group">
            <button class="palette-btn" onclick="updatePalette('ultra')">Blue</button>
            <button class="palette-btn" onclick="updatePalette('fire')">Fire</button>
            <button class="palette-btn reset-btn" onclick="resetView()">Reset</button>
        </div>

        <div class="controls-hint">
            <b>Tap:</b> Zoom In<br>
            <b>Long Press:</b> Zoom Out
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
